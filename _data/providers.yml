---
# The provider list is the canonical column order for the entire comparison page.
# Reordering entries here reorders:
# 1. the provider toggle chips
# 2. the shared sticky provider logo header
# 3. every provider column in every category table
# Keep the IDs stable because the template and CSS-only toggle selectors key off them.
providers:
  - id: openstack
    label: OpenStack
    asset_dir: openstack
    header_type: image
    header_src: assets/img/logo/openstack.svg
    header_alt: OpenStack logo
